<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz z Geografii – Europa Południowa</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Indie+Flower&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #2c2c2c;
    --paper: #faf8f3;
    --paper2: #f5f2ea;
    --accent: #4a7c59;
    --accent2: #c8883a;
    --line: #d4c9b0;
    --red: #c0392b;
    --green: #27ae60;
    --yellow: #f1c40f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Caveat', cursive;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Paper texture lines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(
      transparent,
      transparent 31px,
      var(--line) 31px,
      var(--line) 32px
    );
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }

  /* Red margin line */
  body::after {
    content: '';
    position: fixed;
    top: 0; bottom: 0;
    left: 72px;
    width: 2px;
    background: #e8a0a0;
    opacity: 0.5;
    pointer-events: none;
    z-index: 0;
  }

  .screen {
    position: fixed;
    inset: 0;
    z-index: 1;
    overflow-y: auto;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
    opacity: 0;
    pointer-events: none;
    transform: translateY(16px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    display: flex;
  }
  .screen.active {
    opacity: 1;
    pointer-events: all;
    transform: translateY(0);
  }
  .screen.exit {
    opacity: 0;
    transform: translateY(-16px);
    pointer-events: none;
  }

  /* ===== WELCOME SCREEN ===== */
  #welcome {
    justify-content: center;
    gap: 0;
    padding-top: 40px;
  }

  .welcome-card {
    background: white;
    border: 2px solid var(--line);
    border-radius: 4px;
    padding: 36px 32px 40px;
    max-width: 420px;
    width: 100%;
    box-shadow: 4px 4px 0 var(--line), 8px 8px 0 rgba(0,0,0,0.06);
    position: relative;
    text-align: center;
  }

  .welcome-card::before {
    content: '';
    position: absolute;
    top: -8px; left: 12px; right: 12px; height: 6px;
    background: repeating-linear-gradient(90deg, var(--accent2) 0, var(--accent2) 8px, transparent 8px, transparent 16px);
    border-radius: 2px;
  }

  .subject-badge {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-family: 'Caveat', cursive;
    font-size: 14px;
    font-weight: 600;
    padding: 4px 14px;
    border-radius: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .welcome-title {
    font-family: 'Caveat', cursive;
    font-size: 42px;
    font-weight: 700;
    line-height: 1.1;
    color: var(--ink);
    margin-bottom: 6px;
  }

  .welcome-subtitle {
    font-family: 'Patrick Hand', cursive;
    font-size: 18px;
    color: #888;
    margin-bottom: 28px;
  }

  .info-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .info-chip {
    background: var(--paper2);
    border: 1.5px solid var(--line);
    border-radius: 12px;
    padding: 8px 16px;
    font-family: 'Caveat', cursive;
    font-size: 17px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .info-chip span { font-size: 20px; }

  .difficulty {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 28px;
    align-items: center;
  }

  .diff-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid var(--line);
  }
  .diff-dot.filled { background: var(--accent2); border-color: var(--accent2); }

  .diff-label {
    font-family: 'Caveat', cursive;
    font-size: 16px;
    color: #999;
    margin-left: 8px;
  }

  .btn-start {
    background: var(--ink);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 14px 40px;
    font-family: 'Caveat', cursive;
    font-size: 24px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 3px 3px 0 rgba(0,0,0,0.2);
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 0.5px;
  }

  .btn-start:active {
    transform: translate(2px,2px);
    box-shadow: 1px 1px 0 rgba(0,0,0,0.2);
  }

  /* ===== QUIZ SCREEN ===== */
  #quiz {
    gap: 16px;
    padding-top: 16px;
  }

  .quiz-top {
    width: 100%;
    max-width: 500px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .progress-bar-wrap {
    flex: 1;
    height: 8px;
    background: var(--line);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .q-counter {
    font-family: 'Caveat', cursive;
    font-size: 18px;
    color: #888;
    white-space: nowrap;
  }

  .timer-box {
    font-family: 'Caveat', cursive;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    min-width: 48px;
    text-align: right;
  }

  .timer-box.warning { color: var(--red); animation: pulse 0.6s infinite alternate; }

  @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }

  .question-card {
    background: white;
    border: 1.5px solid var(--line);
    border-radius: 4px;
    padding: 20px 16px 20px;
    max-width: 500px;
    width: 100%;
    box-shadow: 3px 3px 0 rgba(0,0,0,0.07);
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }

  .q-emoji {
    font-size: 40px;
    flex-shrink: 0;
    line-height: 1;
    margin-top: 2px;
  }

  .q-content { flex: 1; }

  .q-number {
    font-family: 'Caveat', cursive;
    font-size: 13px;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .q-text {
    font-family: 'Caveat', cursive;
    font-size: 22px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--ink);
  }

  /* Answers */
  .answers-wrap {
    max-width: 500px;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .answer-btn {
    background: white;
    border: 1.5px solid var(--line);
    border-radius: 4px;
    padding: 13px 18px;
    font-family: 'Caveat', cursive;
    font-size: 20px;
    color: var(--ink);
    cursor: pointer;
    text-align: left;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.05);
    transition: transform 0.1s, border-color 0.15s, background 0.15s;
    position: relative;
    overflow: hidden;
  }

  .answer-btn::before {
    content: attr(data-letter);
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    color: #ccc;
    font-family: 'Caveat', cursive;
  }

  .answer-btn { padding-left: 34px; }

  .answer-btn:hover:not(:disabled) {
    border-color: var(--accent2);
    background: #fffbf4;
    transform: translateX(3px);
  }

  .answer-btn.correct {
    border-color: var(--green);
    background: #eafaf1;
    color: var(--green);
    font-weight: 600;
  }

  .answer-btn.wrong {
    border-color: var(--red);
    background: #fdf2f2;
    color: var(--red);
    text-decoration: line-through;
  }

  .answer-btn.reveal {
    border-color: var(--green);
    background: #eafaf1;
    color: var(--green);
    font-weight: 600;
  }

  .answer-btn:disabled { cursor: default; }

  .feedback-strip {
    max-width: 500px;
    width: 100%;
    padding: 12px 18px;
    border-radius: 4px;
    font-family: 'Caveat', cursive;
    font-size: 20px;
    font-weight: 600;
    display: none;
    align-items: center;
    gap: 10px;
    border: 1.5px solid;
  }

  .feedback-strip.correct-fb {
    background: #eafaf1;
    border-color: var(--green);
    color: var(--green);
    display: flex;
  }

  .feedback-strip.wrong-fb {
    background: #fdf2f2;
    border-color: var(--red);
    color: var(--red);
    display: flex;
  }

  .btn-next {
    background: var(--ink);
    color: white;
    border: none;
    border-radius: 4px;
    padding: 12px 32px;
    font-family: 'Caveat', cursive;
    font-size: 22px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 3px 3px 0 rgba(0,0,0,0.2);
    transition: transform 0.1s;
    display: none;
  }
  .btn-next.visible { display: block; }
  .btn-next:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 rgba(0,0,0,0.2); }

  /* ===== RESULTS SCREEN ===== */
  #results {
    justify-content: flex-start;
    padding-top: 0;
    min-height: 100vh;
  }

  .results-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    transition: background 1s ease;
  }

  #results .screen-inner {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 500px;
    padding: 24px 16px 50px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .results-card {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(6px);
    border: 2px solid var(--line);
    border-radius: 4px;
    padding: 28px 24px;
    width: 100%;
    text-align: center;
    box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
  }

  .result-emoji { font-size: 64px; margin-bottom: 8px; display: block; }

  .result-verdict {
    font-family: 'Caveat', cursive;
    font-size: 34px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .result-score {
    font-family: 'Caveat', cursive;
    font-size: 52px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
  }

  .result-score-max {
    font-family: 'Caveat', cursive;
    font-size: 22px;
    color: #999;
    margin-bottom: 16px;
  }

  .result-time {
    font-family: 'Caveat', cursive;
    font-size: 18px;
    color: #888;
    margin-bottom: 4px;
  }

  .result-pct {
    font-family: 'Caveat', cursive;
    font-size: 18px;
    color: #aaa;
  }

  .result-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
  }

  .btn-action {
    background: white;
    border: 1.5px solid var(--ink);
    border-radius: 4px;
    padding: 13px 20px;
    font-family: 'Caveat', cursive;
    font-size: 21px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.1);
    transition: transform 0.1s;
  }
  .btn-action:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 rgba(0,0,0,0.1); }
  .btn-action.primary { background: var(--ink); color: white; }

  .answers-review {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(6px);
    border: 1.5px solid var(--line);
    border-radius: 4px;
    width: 100%;
    overflow: hidden;
    display: none;
    box-shadow: 3px 3px 0 rgba(0,0,0,0.07);
  }
  .answers-review.open { display: block; }

  .review-title {
    font-family: 'Caveat', cursive;
    font-size: 20px;
    font-weight: 700;
    padding: 14px 18px 10px;
    border-bottom: 1px solid var(--line);
  }

  .review-item {
    padding: 12px 18px;
    border-bottom: 1px solid var(--line);
    font-family: 'Caveat', cursive;
    font-size: 17px;
    line-height: 1.4;
  }

  .review-item:last-child { border-bottom: none; }

  .review-q { color: #888; font-size: 15px; margin-bottom: 2px; }

  .review-your {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .review-correct { color: var(--green); font-weight: 600; }
  .review-wrong { color: var(--red); text-decoration: line-through; }
  .review-answer { color: var(--green); font-weight: 600; margin-top: 2px; }

  /* Animations */
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .question-card, .answers-wrap, .feedback-strip, .btn-next {
    animation: slideIn 0.3s ease both;
  }

  @keyframes confetti-fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  .confetti-piece {
    position: fixed;
    top: -20px;
    width: 10px; height: 10px;
    border-radius: 2px;
    pointer-events: none;
    animation: confetti-fall linear forwards;
    z-index: 999;
  }
</style>
</head>
<body>

<!-- WELCOME SCREEN -->
<div class="screen active" id="welcome">
  <div class="welcome-card">
    <div class="subject-badge">🌍 Geografia</div>
    <div class="welcome-title">Europa Południowa<br>& Energetyka</div>
    <div class="welcome-subtitle">Sprawdzian – klasa 6</div>
    <div class="info-row">
      <div class="info-chip"><span>📝</span> 13 pytań</div>
      <div class="info-chip"><span>⏱️</span> bez limitu</div>
    </div>
    <div class="difficulty">
      <div class="diff-dot filled"></div>
      <div class="diff-dot filled"></div>
      <div class="diff-dot filled"></div>
      <div class="diff-dot"></div>
      <div class="diff-dot"></div>
      <span class="diff-label">Trudność: średni</span>
    </div>
    <button class="btn-start" onclick="startQuiz()">✏️ Zaczynamy!</button>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div class="screen" id="quiz">
  <div class="quiz-top">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>
    <div class="q-counter" id="qCounter">1/10</div>
    <div class="timer-box" id="timerBox">0:00</div>
  </div>

  <div class="question-card" id="questionCard">
    <div class="q-emoji" id="qEmoji">🌍</div>
    <div class="q-content">
      <div class="q-number" id="qNumber">Pytanie 1</div>
      <div class="q-text" id="qText"></div>
    </div>
  </div>

  <div class="answers-wrap" id="answersWrap"></div>

  <div class="feedback-strip" id="feedbackStrip"></div>

  <button class="btn-next" id="btnNext" onclick="nextQuestion()">Następne →</button>
</div>

<!-- RESULTS SCREEN -->
<div class="screen" id="results">
  <div class="results-bg" id="resultsBg"></div>
  <div class="screen-inner">
    <div class="results-card">
      <span class="result-emoji" id="resultEmoji">🎉</span>
      <div class="result-verdict" id="resultVerdict"></div>
      <div class="result-score" id="resultScore"></div>
      <div class="result-score-max" id="resultScoreMax">na 10 pkt</div>
      <div class="result-time" id="resultTime"></div>
      <div class="result-pct" id="resultPct"></div>
    </div>

    <div class="result-actions">
      <button class="btn-action primary" onclick="retryQuiz()">🔄 Spróbuj ponownie</button>
      <button class="btn-action" onclick="toggleReview()">📋 Zobacz poprawne odpowiedzi</button>
    </div>

    <div class="answers-review" id="answersReview">
      <div class="review-title">✅ Poprawne odpowiedzi</div>
      <div id="reviewList"></div>
    </div>
  </div>
</div>

<script>
const questions = [
  {
    emoji: '🏔️',
    text: 'Wymień 2 walory przyrodnicze Europy Południowej',
    options: [
      'Góry i ciepłe morze',
      'Lasy i rzeki',
      'Pustynie i stepy',
      'Jeziora i torfowiska'
    ],
    correct: 0,
    explanation: 'Góry (np. Alpy, Pireneje, Apeniny) i ciepłe morze (Śródziemne) to główne walory przyrodnicze.'
  },
  {
    emoji: '🎭',
    text: 'Wymień 2 walory kulturowe Europy Południowej',
    options: [
      'Porty i lotniska',
      'Muzea i świątynie',
      'Parki i rezerwaty',
      'Tartaki i gorzelnie'
    ],
    correct: 1,
    explanation: 'Muzea i świątynie (kościoły, katedry, świątynie antyczne) to kluczowe walory kulturowe.'
  },
  {
    emoji: '🛣️',
    text: 'Wymień 2 elementy infrastruktury turystycznej',
    options: [
      'Góry i jeziora',
      'Muzea i galerie',
      'Drogi i hotele',
      'Lasy i parki'
    ],
    correct: 2,
    explanation: 'Drogi i hotele to podstawowe elementy infrastruktury turystycznej.'
  },
  {
    emoji: '🏞️',
    text: 'Jeziora Plitwickie – w jakim kraju się znajdują?',
    options: [
      'Włochy',
      'Francja',
      'Chorwacja',
      'Grecja'
    ],
    correct: 2,
    explanation: 'Jeziora Plitwickie to słynny park narodowy w Chorwacji, wpisany na listę UNESCO.'
  },
  {
    emoji: '🛶',
    text: 'Wenecja – w jakim kraju się znajduje?',
    options: [
      'Grecja',
      'Włochy',
      'Chorwacja',
      'Francja'
    ],
    correct: 1,
    explanation: 'Wenecja to miasto w północno-wschodnich Włoszech, słynące z kanałów.'
  },
  {
    emoji: '🌊',
    text: 'Lazurowe Wybrzeże – w jakim kraju się znajduje?',
    options: [
      'Włochy',
      'Chorwacja',
      'Hiszpania',
      'Francja'
    ],
    correct: 3,
    explanation: 'Lazurowe Wybrzeże (Côte d\'Azur) to region w południowej Francji, znany z luksusowych kurortów i pięknych plaż nad Morzem Śródziemnym.'
  },
  {
    emoji: '🏛️',
    text: 'Koloseum – w jakim kraju się znajduje?',
    options: [
      'Grecja',
      'Chorwacja',
      'Włochy',
      'Francja'
    ],
    correct: 2,
    explanation: 'Koloseum (Amfiteatr Flawiuszów) to starożytna arena w Rzymie, we Włoszech.'
  },
  {
    emoji: '🔥',
    text: 'Na podstawie opisu rozpoznaj typ elektrowni: „Spala węgiel lub gaz, wytwarza parę, która napędza turbinę. Najczęściej spotykana w Polsce."',
    options: [
      'Elektrownia wodna',
      'Elektrownia cieplna',
      'Elektrownia słoneczna',
      'Elektrownia wiatrowa'
    ],
    correct: 1,
    explanation: 'Elektrownia cieplna spala paliwa kopalne (węgiel, gaz). Polska jest krajem, gdzie ten typ dominuje w produkcji energii.'
  },
  {
    emoji: '💧',
    text: 'Na podstawie opisu rozpoznaj typ elektrowni: „Wykorzystuje energię płynącej wody lub spadku wody. Popularna w Norwegii."',
    options: [
      'Elektrownia wiatrowa',
      'Elektrownia geotermalna',
      'Elektrownia wodna',
      'Elektrownia cieplna'
    ],
    correct: 2,
    explanation: 'Elektrownia wodna (hydroelektrownia) produkuje prąd dzięki sile przepływającej wody. Norwegia pokrywa nią prawie całe zapotrzebowanie na energię.'
  },
  {
    emoji: '🌋',
    text: 'Na podstawie opisu rozpoznaj typ elektrowni: „Korzysta z ciepła wnętrza Ziemi. Występuje tam, gdzie jest aktywność wulkaniczna, np. na Słowacji."',
    options: [
      'Elektrownia wiatrowa',
      'Elektrownia słoneczna',
      'Elektrownia cieplna',
      'Elektrownia geotermalna'
    ],
    correct: 3,
    explanation: 'Elektrownia geotermalna czerpie energię z gorących źródeł podziemnych. Typowa dla krajów z aktywnością wulkaniczną – np. Słowacja, Islandia.'
  },
  {
    emoji: '💨',
    text: 'Na podstawie opisu rozpoznaj typ elektrowni: „Zamienia ruch obracających się łopat w energię elektryczną. Dania jest liderem w jej stosowaniu."',
    options: [
      'Elektrownia słoneczna',
      'Elektrownia wiatrowa',
      'Elektrownia wodna',
      'Elektrownia geotermalna'
    ],
    correct: 1,
    explanation: 'Elektrownia wiatrowa – Dania jest europejskim liderem w energetyce wiatrowej.'
  },
  {
    emoji: '☀️',
    text: 'Wymień 4 odnawialne źródła energii (OZE)',
    options: [
      'Ropa, gaz, węgiel, torf',
      'Energia wód, wiatru, słoneczna, biomasa',
      'Węgiel, atom, gaz łupkowy, ropa',
      'Para, metan, etan, butan'
    ],
    correct: 1,
    explanation: 'OZE to: energia wód (hydroenergia), energia wiatru, energia słoneczna i biomasa.'
  },
  {
    emoji: '🏪',
    text: 'Czym są usługi?',
    options: [
      'Produkcja konkretnych dóbr materialnych',
      'Wydobycie surowców naturalnych',
      'Część gospodarki zaspokajająca potrzeby ludzi, organizacji i firm, nie polegająca na wytwarzaniu konkretnych produktów',
      'Handel towarami za granicą'
    ],
    correct: 2,
    explanation: 'Usługi to część gospodarki zaspokajająca potrzeby ludzi, organizacji i firm, ale nie polegająca na wytwarzaniu konkretnych produktów materialnych.'
  }
];

let currentQ = 0;
let score = 0;
let answered = false;
let userAnswers = [];
let startTime, timerInterval;
let elapsedSeconds = 0;

function startQuiz() {
  currentQ = 0; score = 0; userAnswers = [];
  showScreen('quiz');
  startTime = Date.now();
  timerInterval = setInterval(updateTimer, 1000);
  loadQuestion();
}

function updateTimer() {
  elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
  const m = Math.floor(elapsedSeconds / 60);
  const s = elapsedSeconds % 60;
  const box = document.getElementById('timerBox');
  box.textContent = m + ':' + String(s).padStart(2,'0');
  box.className = 'timer-box' + (elapsedSeconds > 120 ? ' warning' : '');
}

function loadQuestion() {
  answered = false;
  const q = questions[currentQ];
  document.getElementById('qEmoji').textContent = q.emoji;
  document.getElementById('qNumber').textContent = 'Pytanie ' + (currentQ + 1);
  document.getElementById('qText').textContent = q.text;
  document.getElementById('qCounter').textContent = (currentQ+1) + '/' + questions.length;
  document.getElementById('progressBar').style.width = (currentQ / questions.length * 100) + '%';
  document.getElementById('feedbackStrip').className = 'feedback-strip';
  document.getElementById('feedbackStrip').textContent = '';
  document.getElementById('btnNext').className = 'btn-next';

  const wrap = document.getElementById('answersWrap');
  wrap.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.setAttribute('data-letter', letters[i]);
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i);
    wrap.appendChild(btn);
  });
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = questions[currentQ];
  const buttons = document.querySelectorAll('.answer-btn');
  const fb = document.getElementById('feedbackStrip');

  userAnswers.push({ q: q.text, chosen: q.options[idx], correct: q.options[q.correct], isCorrect: idx === q.correct });

  if (idx === q.correct) {
    score++;
    buttons[idx].classList.add('correct');
    fb.textContent = '✅ Dobrze! ' + q.explanation;
    fb.className = 'feedback-strip correct-fb';
  } else {
    buttons[idx].classList.add('wrong');
    buttons[q.correct].classList.add('reveal');
    fb.textContent = '❌ Niestety… Poprawna: ' + q.options[q.correct];
    fb.className = 'feedback-strip wrong-fb';
  }

  buttons.forEach(b => b.disabled = true);
  document.getElementById('btnNext').className = 'btn-next visible';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) {
    showResults();
  } else {
    loadQuestion();
  }
}

function showResults() {
  clearInterval(timerInterval);
  showScreen('results');

  const pct = score / questions.length;
  const m = Math.floor(elapsedSeconds / 60);
  const s = elapsedSeconds % 60;

  document.getElementById('resultScore').textContent = score;
  document.getElementById('resultScoreMax').textContent = 'na ' + questions.length + ' pkt';
  document.getElementById('resultTime').textContent = '⏱️ Czas: ' + m + ':' + String(s).padStart(2,'0');
  document.getElementById('resultPct').textContent = Math.round(pct * 100) + '% poprawnych odpowiedzi';

  let emoji, verdict, gradient;
  if (pct >= 0.9) {
    emoji = '🏆'; verdict = 'Mistrz geografii!';
    gradient = 'linear-gradient(135deg, #1a9e5c 0%, #27ae60 40%, #2ecc71 100%)';
    launchConfetti();
  } else if (pct >= 0.7) {
    emoji = '😊'; verdict = 'Bardzo dobrze!';
    gradient = 'linear-gradient(135deg, #27ae60 0%, #f1c40f 100%)';
  } else if (pct >= 0.5) {
    emoji = '😐'; verdict = 'Umiesz na tyle.';
    gradient = 'linear-gradient(135deg, #f1c40f 0%, #e67e22 100%)';
  } else if (pct >= 0.3) {
    emoji = '😬'; verdict = 'Jeszcze trochę nauki!';
    gradient = 'linear-gradient(135deg, #e67e22 0%, #c0392b 100%)';
  } else {
    emoji = '😰'; verdict = 'Powtórz materiał!';
    gradient = 'linear-gradient(135deg, #c0392b 0%, #922b21 100%)';
  }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultVerdict').textContent = verdict;
  document.getElementById('resultsBg').style.background = gradient;

  // Build review
  const list = document.getElementById('reviewList');
  list.innerHTML = '';
  userAnswers.forEach((a, i) => {
    const div = document.createElement('div');
    div.className = 'review-item';
    div.innerHTML = `<div class="review-q">Pyt. ${i+1}: ${a.q}</div>
      <div class="review-your ${a.isCorrect ? 'review-correct' : 'review-wrong'}">
        ${a.isCorrect ? '✅' : '❌'} Twoja odpowiedź: ${a.chosen}
      </div>
      ${!a.isCorrect ? `<div class="review-answer">➡️ Poprawna: ${a.correct}</div>` : ''}`;
    list.appendChild(div);
  });
}

function retryQuiz() {
  document.getElementById('answersReview').className = 'answers-review';
  startQuiz();
}

function toggleReview() {
  const r = document.getElementById('answersReview');
  r.className = r.classList.contains('open') ? 'answers-review' : 'answers-review open';
}

function showScreen(id) {
  const current = document.querySelector('.screen.active');
  const next = document.getElementById(id);
  if (current && current !== next) {
    current.classList.add('exit');
    setTimeout(() => {
      current.classList.remove('active', 'exit');
      next.classList.add('active');
    }, 350);
  } else {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active', 'exit'));
    next.classList.add('active');
  }
}

function launchConfetti() {
  const colors = ['#27ae60','#f1c40f','#e74c3c','#3498db','#9b59b6','#e67e22'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.width = (8 + Math.random() * 8) + 'px';
      el.style.height = (8 + Math.random() * 8) + 'px';
      el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      el.style.animationDelay = (Math.random() * 0.5) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }, i * 40);
  }
}
</script>
